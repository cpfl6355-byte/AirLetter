<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google 계정으로 로그인</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #FFFFFF;
      font-family: Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-container {
      width: 100%;
      max-width: 450px;
      border: 1px solid #DADCE0;
      border-radius: 8px;
      padding: 40px;
      box-sizing: border-box;
      text-align: center;
    }
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    .title {
      font-size: 24px;
      color: #202124;
      margin-bottom: 8px;
      font-weight: 400;
    }
    .subtitle {
      font-size: 16px;
      color: #202124;
      margin-bottom: 24px;
    }
    .input-field {
      width: 100%;
      height: 56px;
      border: 1px solid #DADCE0;
      border-radius: 4px;
      padding: 0 16px;
      font-size: 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
      outline: none;
    }
    .input-field:focus {
      border-color: #1A73E8;
      border-width: 2px;
    }
    .btn-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
    }
    .create-acc {
      color: #1A73E8;
      font-size: 14px;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
    }
    .submit-btn {
      height: 36px;
      background: #1A73E8;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      color: #FFFFFF;
      cursor: pointer;
      padding: 0 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    .submit-btn:hover {
      background: #1557B0;
    }
    .demo-notice {
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      color: #1D4ED8;
      border-radius: 6px;
      padding: 12px;
      font-size: 13px;
      margin-bottom: 24px;
      text-align: left;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <svg width="74" height="24" viewBox="0 0 74 24">
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      </svg>
    </div>
    
    <div class="title">로그인</div>
    <div class="subtitle">맑은숨 서비스로 계속</div>

    <div class="demo-notice">
      💡 <strong>맑은숨 테스트 모드</strong>입니다.<br>
      실제 비밀번호를 입력하지 마시고, 바로 [다음] 버튼을 눌러주세요.
    </div>

    <input type="text" class="input-field" value="guardian@gmail.com" readonly>

    <div class="btn-row">
      <button class="create-acc">계정 만들기</button>
      <button class="submit-btn" onclick="submitLogin()">다음</button>
    </div>
  </div>

  <script>
    function submitLogin() {
      if (window.opener) {
        window.opener.postMessage({
          type: 'MOCK_LOGIN_SUCCESS',
          provider: 'google',
          username: '민수'
        }, '*');
      }
      window.close();
    }
  </script>
</body>
</html>
